<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="orbital" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <ellipse cx="180" cy="40" rx="172" ry="32"
    stroke="url(#orbital)" stroke-width="1.5" fill="none"
    transform="rotate(-5, 180, 40)"/>
  <circle r="4" fill="#60a5fa">
    <animateMotion dur="6s" repeatCount="indefinite">
      <mpath href="#orbit-path"/>
    </animateMotion>
  </circle>
  <ellipse id="orbit-path" cx="180" cy="40" rx="172" ry="32"
    transform="rotate(-5, 180, 40)" fill="none" stroke="none"/>
  <text x="180" y="44" text-anchor="middle"
    font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="46" letter-spacing="0.1em" fill="#e2e8f0">
    <tspan font-weight="600" fill="#60a5fa">v</tspan><tspan font-weight="300">alence</tspan>
  </text>
</svg>
