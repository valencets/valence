name: Setup Project
description: Install Node 22, pnpm 10.30.3, project dependencies with cache, and Playwright browser cache

inputs:
  install-playwright:
    description: Whether to install Playwright browsers
    required: false
    default: 'false'
  playwright-browser:
    description: Playwright browser to install (chromium, firefox, webkit)
    required: false
    default: 'chromium'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.30.3

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.store }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ inputs.playwright-browser }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          playwright-${{ inputs.playwright-browser }}-

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps ${{ inputs.playwright-browser }}

    - name: Install Playwright system deps only (cache hit)
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps ${{ inputs.playwright-browser }}
