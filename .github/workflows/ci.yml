name: CI

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]
  workflow_dispatch:
  schedule:
    # Weekly full suite — every Monday at 03:00 UTC
    - cron: '0 3 * * 1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ─── Phase 1: Quality gate (parallel) ────────────────────────────────────────

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - run: pnpm lint
      - run: pnpm check:patterns

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - run: pnpm build
      - run: pnpm check:size

  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - run: pnpm audit --audit-level=high

# ─── Phase 2: Build artifact ──────────────────────────────────────────────────

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Build all packages
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            packages/*/dist/
            packages/*/admin-client.js
          retention-days: 1

# ─── Phase 3: Fan-out test suite ─────────────────────────────────────────────

  unit:
    name: Unit (${{ matrix.shard }})
    needs: [build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run unit tests (shard ${{ matrix.shard }})
        run: pnpm test:ci --shard=${{ matrix.shard }}

  integration:
    name: Integration
    needs: [build]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run integration tests
        run: npx vitest run tests/integration/
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres

  e2e:
    name: E2E (${{ matrix.shard }}/2)
    needs: [build]
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
        with:
          install-playwright: 'true'
          playwright-browser: chromium
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: pnpm test:e2e --shard=${{ matrix.shard }}/2
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm test:e2e --ignore=tests/e2e/visual/
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1
      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  e2e-merge-report:
    name: E2E - Merge Reports
    needs: [e2e]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: blob-reports/
      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html blob-reports/
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  contracts:
    name: Contract Tests
    needs: [build]

  visual:
    needs: [unit]
    runs-on: ubuntu-24.04
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Run visual regression tests
        run: pnpm test:visual
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-report
          path: |
            playwright-report/
            tests/e2e/__snapshots__/
          retention-days: 7
  coverage:
    needs: [unit]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run contract tests
        run: npx vitest run tests/contracts/

  coverage:
    name: Coverage (80% gate)
    needs: [build]
  perf:
    needs: [unit]
    runs-on: ubuntu-24.04
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: grafana/setup-k6-action@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start perf test server
        run: node tests/perf/server.mjs &
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PORT: 3000
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server ready"; break
            fi
            echo "Waiting for server... attempt $i"
            sleep 2
          done
      - name: Seed test data
        run: k6 run --env BASE_URL=http://localhost:3000 tests/perf/seed.js
        env:
          SEED_COUNT: 200
        continue-on-error: true
      - name: Run smoke test (PR) or full load test (main)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.ref }}" = "refs/heads/development" ]; then
            k6 run --env BASE_URL=http://localhost:3000 tests/perf/load.js
          else
            k6 run --env BASE_URL=http://localhost:3000 tests/perf/smoke.js
          fi
      - name: Generate k6 summary artifact
        if: always()
        run: |
          if [ -f k6-summary.json ]; then
            echo "k6 summary artifact found"
          else
            echo '{"note":"k6 summary not generated (no --summary-export flag used)"}' > k6-summary.json
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: k6-summary.json
          retention-days: 30

  security:
    needs: [lint]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run coverage with threshold
        run: cd packages/cms && npx vitest run --coverage --coverage.thresholds.statements=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/cms/coverage/
          retention-days: 30

# ─── Phase 4: Fan-in gate ────────────────────────────────────────────────────

  ci-gate:
    name: CI Gate
    needs: [unit, integration, e2e-merge-report, contracts, coverage, security]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check all upstream results
        env:
          UNIT: ${{ needs.unit.result }}
          INTEGRATION: ${{ needs.integration.result }}
          E2E_MERGE: ${{ needs.e2e-merge-report.result }}
          CONTRACTS: ${{ needs.contracts.result }}
          COVERAGE: ${{ needs.coverage.result }}
          SECURITY: ${{ needs.security.result }}
        run: |
          results=("$UNIT" "$INTEGRATION" "$E2E_MERGE" "$CONTRACTS" "$COVERAGE" "$SECURITY")
          failed=false
          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "Job failed or was skipped: $result"
              failed=true
            fi
          done
          if [ "$failed" = "true" ]; then
            echo "CI gate: FAILED"
            exit 1
          fi
          echo "CI gate: PASSED"

# ─── Phase 5: Main-branch extras ─────────────────────────────────────────────

  e2e-full:
    name: E2E Full (${{ matrix.browser }}, ${{ matrix.shard }}/4)
    needs: [ci-gate]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
        with:
          install-playwright: 'true'
          playwright-browser: ${{ matrix.browser }}
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Run E2E (${{ matrix.browser }}, shard ${{ matrix.shard }}/4)
        run: pnpm test:e2e --shard=${{ matrix.shard }}/4
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  stryker-incremental:
    name: Stryker (incremental)
    needs: [ci-gate]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-project
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: .stryker-tmp/
          key: stryker-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ runner.os }}-
      - name: Run Stryker mutation tests (incremental)
        run: pnpm test:mutate

# ─── Phase 6: Publish & Release (unchanged) ──────────────────────────────────

  publish:
    needs: [ci-gate]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish packages
        run: |
          for pkg in packages/ui packages/core packages/db packages/telemetry packages/cms packages/valence; do
            cd "$GITHUB_WORKSPACE/$pkg"
            VERSION=$(node -p "require('./package.json').version")
            NAME=$(node -p "require('./package.json').name")
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" != "$VERSION" ]; then
              pnpm publish --access public --provenance --no-git-checks
              echo "Published $NAME@$VERSION"
            else
              echo "Skipped $NAME@$VERSION (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  release:
    needs: [publish]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - name: Create GitHub releases for newly published packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in packages/ui packages/core packages/db packages/telemetry packages/cms packages/valence; do
            VERSION=$(node -p "require('./$pkg/package.json').version")
            NAME=$(node -p "require('./$pkg/package.json').name")
            SHORT=$(echo "$NAME" | sed 's/@valencets\///')
            TAG="${SHORT}@${VERSION}"

            # Skip if tag already exists
            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
              continue
            fi

            # Check if this version was actually published (not skipped)
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ "$PUBLISHED" != "$VERSION" ]; then
              echo "Version $NAME@$VERSION not on npm, skipping release"
              continue
            fi

            # Find previous tag for this package to generate changelog
            PREV_TAG=$(git tag -l "${SHORT}@*" --sort=-v:refname | head -1)
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD -- "$pkg")
            else
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20 -- "$pkg")
            fi

            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="- Release $TAG"
            fi

            # Create tag and release
            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --title "$NAME v$VERSION" \
              --notes "$(printf '## %s v%s\n\n### Changes\n\n%s\n\n### Install\n\n```bash\npnpm add %s@%s\n```' "$NAME" "$VERSION" "$CHANGELOG" "$NAME" "$VERSION")"

            echo "Created release $TAG"
          done

# ─── Weekly schedule: Full Stryker + load test placeholder ───────────────────

  stryker-full:
    name: Stryker (full, weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-project
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: .stryker-tmp/
          key: stryker-full-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            stryker-full-${{ runner.os }}-
      - name: Run full Stryker mutation suite
        run: pnpm test:mutate

  load-test:
    name: Load Test (placeholder, weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Load test placeholder
        run: echo "Load test placeholder — see VAL-176 for k6 implementation"
