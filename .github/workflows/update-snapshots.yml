name: Update Visual Snapshots

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-snapshots:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/update-snapshots'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            core.setOutput('head_ref', pr.data.head.ref)
            core.setOutput('head_sha', pr.data.head.sha)

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update visual snapshots
        run: npx playwright test tests/e2e/visual/ --update-snapshots
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres

      - name: Commit updated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update visual snapshots [skip ci]'
          file_pattern: 'tests/e2e/__snapshots__/**/*.png'
          branch: ${{ steps.pr.outputs.head_ref }}
