name: Update Visual Snapshots

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-snapshots:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/update-snapshots' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            core.setOutput('head_ref', pr.data.head.ref)
            core.setOutput('head_sha', pr.data.head.sha)
            core.setOutput('head_repo', pr.data.head.repo.full_name)

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject fork PRs
        run: test "${{ steps.pr.outputs.head_repo }}" = "${{ github.repository }}"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update visual snapshots
        run: npx playwright test tests/e2e/visual/ --update-snapshots
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres

      - name: Commit updated snapshots
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if git diff --quiet -- tests/e2e/__snapshots__/; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git fetch origin "$HEAD_REF"
          CURRENT_REMOTE_SHA="$(git rev-parse "origin/$HEAD_REF")"
          if [ "$CURRENT_REMOTE_SHA" != "$HEAD_SHA" ]; then
            echo "PR branch changed after approval. Refusing to push snapshot updates."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/
          git commit -m 'chore: update visual snapshots [skip ci]'
          git push origin "HEAD:refs/heads/$HEAD_REF" --force-with-lease="refs/heads/${HEAD_REF}:${HEAD_SHA}"
