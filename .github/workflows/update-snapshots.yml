name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      head_ref:
        description: Branch to update snapshots on
        required: true
        type: string
      head_sha:
        description: Reviewed commit SHA to lease snapshot updates against
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update visual snapshots
        run: npx playwright test tests/e2e/visual/ --update-snapshots
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres

      - name: Commit updated snapshots
        env:
          HEAD_REF: ${{ inputs.head_ref }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          if git diff --quiet -- tests/e2e/__snapshots__/; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git fetch origin "$HEAD_REF"
          CURRENT_REMOTE_SHA="$(git rev-parse "origin/$HEAD_REF")"
          if [ "$CURRENT_REMOTE_SHA" != "$HEAD_SHA" ]; then
            echo "PR branch changed after approval. Refusing to push snapshot updates."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/
          git commit -m 'chore: update visual snapshots [skip ci]'
          git push origin "HEAD:refs/heads/$HEAD_REF" --force-with-lease="refs/heads/${HEAD_REF}:${HEAD_SHA}"
